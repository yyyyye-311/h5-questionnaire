<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>痕迹问卷 Trace Survey</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --black: #111;
  --white: #fff;
  --gray-light: #f5f5f5;
  --gray-mid: #ccc;
  --gray-dark: #666;
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: var(--white);
  color: var(--black);
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Progress Bar */
.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--gray-light);
  z-index: 1000;
}

.progress-fill {
  height: 100%;
  background: var(--black);
  transition: width var(--transition);
  width: 0%;
}

/* Container */
.container {
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Screens */
.screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 32px 100px;
  opacity: 0;
  transform: translateX(60px);
  transition: opacity var(--transition), transform var(--transition);
  pointer-events: none;
  overflow-y: auto;
}

.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}

.screen.exit-left {
  opacity: 0;
  transform: translateX(-60px);
}

/* Section Label */
.section-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-dark);
  margin-bottom: 16px;
}

/* Question */
.question-title {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.5;
  margin-bottom: 6px;
}

.question-subtitle {
  font-size: 14px;
  color: var(--gray-dark);
  margin-bottom: 36px;
  line-height: 1.4;
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-card {
  padding: 16px 20px;
  border: 1.5px solid var(--gray-mid);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.option-card:active {
  transform: scale(0.97);
}

.option-card.selected {
  border-color: var(--black);
  background: var(--black);
  color: var(--white);
}

.option-label {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
}

.option-sublabel {
  font-size: 12px;
  color: var(--gray-dark);
  margin-top: 2px;
}

.option-card.selected .option-sublabel {
  color: rgba(255,255,255,0.6);
}

/* Text Inputs */
.input-group {
  margin-bottom: 20px;
}

.input-label {
  font-size: 13px;
  color: var(--gray-dark);
  margin-bottom: 8px;
  display: block;
}

.text-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--gray-mid);
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  background: var(--white);
  color: var(--black);
}

.text-input:focus {
  border-color: var(--black);
}

textarea.text-input {
  min-height: 140px;
  resize: vertical;
  line-height: 1.6;
}

/* Canvas */
.canvas-wrapper {
  width: 100%;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.canvas-container {
  flex: 1;
  border: 1.5px solid var(--gray-mid);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  min-height: 200px;
  touch-action: none;
}

.canvas-container canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: crosshair;
}

.canvas-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  flex-wrap: wrap;
}

.color-picker {
  display: flex;
  gap: 8px;
  align-items: center;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}

.color-swatch:active {
  transform: scale(0.9);
}

.color-swatch.active {
  border-color: var(--black);
  transform: scale(1.15);
}

.brush-size {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 100px;
}

.brush-size input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--gray-mid);
  border-radius: 2px;
  outline: none;
}

.brush-size input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--black);
  cursor: pointer;
}

.canvas-btn {
  padding: 8px 14px;
  border: 1.5px solid var(--gray-mid);
  border-radius: 8px;
  background: var(--white);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  color: var(--black);
}

.canvas-btn:active {
  background: var(--black);
  color: var(--white);
}

/* Navigation */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 16px 32px;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
}

.nav-btn {
  padding: 12px 28px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  border: none;
}

.nav-btn.prev {
  background: transparent;
  color: var(--gray-dark);
}

.nav-btn.prev:hover {
  color: var(--black);
}

.nav-btn.next,
.nav-btn.submit {
  background: var(--black);
  color: var(--white);
}

.nav-btn.next:active,
.nav-btn.submit:active {
  transform: scale(0.95);
}

.nav-btn:disabled {
  opacity: 0.3;
  pointer-events: none;
}

.nav-counter {
  font-size: 12px;
  color: var(--gray-dark);
}

/* Submit overlay */
.submit-overlay {
  position: fixed;
  inset: 0;
  background: var(--white);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.submit-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.submit-overlay .checkmark {
  width: 60px;
  height: 60px;
  border: 2px solid var(--black);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.submit-overlay .message {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.submit-overlay .sub-message {
  font-size: 14px;
  color: var(--gray-dark);
}

/* Responsive */
@media (min-width: 600px) {
  .screen {
    max-width: 520px;
    margin: 0 auto;
    left: 50%;
    transform: translateX(-50%);
  }
  .screen.active {
    transform: translateX(-50%);
  }
  .screen.exit-left {
    transform: translateX(calc(-50% - 60px));
  }
  .nav-bar {
    max-width: 520px;
    left: 50%;
    transform: translateX(-50%);
  }
}
</style>
</head>
<body>

<div class="progress-bar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="container" id="app"></div>

<div class="nav-bar">
  <button class="nav-btn prev" id="btnPrev" onclick="prevScreen()">返回</button>
  <span class="nav-counter" id="navCounter">1 / 16</span>
  <button class="nav-btn next" id="btnNext" onclick="nextScreen()">下一题</button>

<div class="submit-overlay" id="submitOverlay">

    subtitle: 'Share an object that represents your current state, and describe it in one word.',
    fields: [
      { key: 'object', label: '物品 Object', placeholder: '例如：一只旧杯子' },

    ]
  },
  {

    placeholder: '可以是任何时刻...'
  },
  {

    title: '请画出你今天的路径图',
    subtitle: 'Draw your path today.'
  }

// State
let current = 0;
const answers = {};
let canvasHistory = [];
let isDrawing = false;
let lastX = 0, lastY = 0;
let brushColor = '#111111';
let brushSize = 4;
let ctx = null;
let canvas = null;

// Render screens
function renderApp() {
  const app = document.getElementById('app');
  app.innerHTML = questions.map((q, i) => {
    let content = '';

    if (q.type === 'choice') {
      content = `<div class="options">${q.options.map(opt => `
        <div class="option-card" data-q="${q.id}" data-val="${opt.value}" onclick="selectOption(${q.id}, '${opt.value}', this)">
          <div class="option-label">${opt.zh}</div>
          <div class="option-sublabel">${opt.en}</div>
        </div>
      `).join('')}</div>`;
    } else if (q.type === 'dual-input') {
      content = q.fields.map(f => `
        <div class="input-group">
          <label class="input-label">${f.label}</label>
          <input type="text" class="text-input" placeholder="${f.placeholder}" data-q="${q.id}" data-field="${f.key}" oninput="handleTextInput(${q.id}, '${f.key}', this.value)">
        </div>
      `).join('');
    } else if (q.type === 'textarea') {
      content = `
        <div class="input-group">
          <textarea class="text-input" placeholder="${q.placeholder}" data-q="${q.id}" oninput="handleTextarea(${q.id}, this.value)"></textarea>
        </div>
      `;
    } else if (q.type === 'canvas') {
      content = `
        <div class="canvas-wrapper">
          <div class="canvas-controls">
            <div class="color-picker">
              <div class="color-swatch active" style="background:#111" data-color="#111111" onclick="setColor(this, '#111111')"></div>
              <div class="color-swatch" style="background:#666" data-color="#666666" onclick="setColor(this, '#666666')"></div>
              <div class="color-swatch" style="background:#999" data-color="#999999" onclick="setColor(this, '#999999')"></div>
              <div class="color-swatch" style="background:#ccc" data-color="#cccccc" onclick="setColor(this, '#cccccc')"></div>
              <div class="color-swatch" style="background:#e74c3c" data-color="#e74c3c" onclick="setColor(this, '#e74c3c')"></div>
            </div>
            <div class="brush-size">
              <input type="range" min="1" max="20" value="4" oninput="setBrushSize(this.value)">
            </div>
            <button class="canvas-btn" onclick="undoCanvas()">撤销</button>
            <button class="canvas-btn" onclick="clearCanvas()">清除</button>
          </div>
          <div class="canvas-container">
            <canvas id="drawCanvas"></canvas>
          </div>
        </div>
      `;
    }

    return `
      <div class="screen${i === 0 ? ' active' : ''}" id="screen-${i}">
        <div class="section-label">${q.section}</div>
        <div class="question-title">${q.title}</div>
        <div class="question-subtitle">${q.subtitle}</div>
        ${content}
      </div>
    `;
  }).join('');

  updateNav();
}

// Option selection
function selectOption(qId, value, el) {
  answers[qId] = value;
  const cards = el.parentElement.querySelectorAll('.option-card');
  cards.forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  // Auto-advance after brief delay
  setTimeout(() => nextScreen(), 300);
}

// Text inputs
function handleTextInput(qId, field, value) {
  if (!answers[qId]) answers[qId] = {};
  answers[qId][field] = value;
}

function handleTextarea(qId, value) {
  answers[qId] = value;
}

// Canvas
function setColor(el, color) {
  brushColor = color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

function setBrushSize(val) {
  brushSize = parseInt(val);
}

function initCanvas() {
  canvas = document.getElementById('drawCanvas');
  if (!canvas) return;

  const container = canvas.parentElement;
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';

  ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  saveCanvasState();

  // Mouse events
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);

  // Touch events
  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', endDraw);
  canvas.addEventListener('touchcancel', endDraw);
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function startDraw(e) {
  isDrawing = true;
  const pos = getCanvasPos(e);
  lastX = pos.x;
  lastY = pos.y;
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!isDrawing) return;
  const pos = getCanvasPos(e);
  ctx.strokeStyle = brushColor;
  ctx.lineWidth = brushSize;
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  lastX = pos.x;
  lastY = pos.y;
}

function endDraw() {
  if (isDrawing) {
    isDrawing = false;
    saveCanvasState();
  }
}

function handleTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const mouseEvent = new MouseEvent('mousedown', {
    clientX: touch.clientX,
    clientY: touch.clientY
  });
  startDraw(mouseEvent);
}

function handleTouchMove(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const mouseEvent = new MouseEvent('mousemove', {
    clientX: touch.clientX,
    clientY: touch.clientY
  });
  draw(mouseEvent);
}

function saveCanvasState() {
  canvasHistory.push(canvas.toDataURL());
  if (canvasHistory.length > 30) canvasHistory.shift();
}

function undoCanvas() {
  if (canvasHistory.length > 1) {
    canvasHistory.pop();
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, canvas.width / 2, canvas.height / 2);
      ctx.drawImage(img, 0, 0, canvas.width / 2, canvas.height / 2);
    };
    img.src = canvasHistory[canvasHistory.length - 1];
  }
}

function clearCanvas() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width / 2, canvas.height / 2);
  saveCanvasState();
}

// Navigation
function nextScreen() {
  if (current >= questions.length - 1) {
    submitForm();
    return;
  }

  const currentScreen = document.getElementById(`screen-${current}`);
  currentScreen.classList.remove('active');
  currentScreen.classList.add('exit-left');

  current++;

  const nextScreenEl = document.getElementById(`screen-${current}`);
  nextScreenEl.classList.remove('exit-left');
  nextScreenEl.classList.add('active');

  updateNav();

  // Init canvas when reaching that screen
  if (questions[current].type === 'canvas') {
    setTimeout(initCanvas, 500);
  }
}

function prevScreen() {
  if (current <= 0) return;

  const currentScreen = document.getElementById(`screen-${current}`);
  currentScreen.classList.remove('active');

  current--;

  const prevScreenEl = document.getElementById(`screen-${current}`);
  prevScreenEl.classList.remove('exit-left');
  prevScreenEl.classList.add('active');

  updateNav();
}

function updateNav() {
  const progress = ((current + 1) / questions.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('navCounter').textContent = `${current + 1} / ${questions.length}`;

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');

  btnPrev.style.visibility = current === 0 ? 'hidden' : 'visible';

  if (current === questions.length - 1) {
    btnNext.textContent = '提交';
    btnNext.classList.add('submit');
    btnNext.classList.remove('next');
  } else {
    btnNext.textContent = '下一题';
    btnNext.classList.remove('submit');
    btnNext.classList.add('next');
  }
}

// Submit
async function submitForm() {
  // Get canvas data
  let canvasData = null;
  if (canvas) {
    canvasData = canvas.toDataURL('image/png');
  }

  const payload = {
    answers: {},
    canvas: canvasData,
    submittedAt: new Date().toISOString()
  };

  // Format answers
  questions.forEach(q => {
    if (q.type === 'choice') {
      payload.answers[`q${q.id}`] = answers[q.id] || null;
    } else if (q.type === 'dual-input') {
      payload.answers[`q${q.id}`] = answers[q.id] || { object: '', adjective: '' };
    } else if (q.type === 'textarea') {
      payload.answers[`q${q.id}`] = answers[q.id] || '';
    }
  });

  try {
    await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    console.log('Submit endpoint not available, payload logged:', payload);
  }

  // Show success
  document.getElementById('submitOverlay').classList.add('visible');
}

// Init
renderApp();
</script>
